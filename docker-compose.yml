# One root compose for the Deal Pipeline build.
#   app      — PHP 8.5, runs both `bin/console app:run-cycle` and the review page.
#   postgres — the datastore (cycle_run / found_deal / posted_deal).
# The whole monorepo is mounted into `app` so the packages/shared path repo resolves.
services:
  app:
    build:
      context: .
      dockerfile: apps/pipeline/Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      # Reach postgres over the compose network rather than localhost.
      DATABASE_URL: postgresql://${POSTGRES_USER:-deal_promoter}:${POSTGRES_PASSWORD:-deal_promoter}@postgres:5432/${POSTGRES_DB:-deal_promoter}?serverVersion=16&charset=utf8
      # Reach the WhatsApp gateway over the compose network. The internal key must
      # match the whatsapp-service side (same ${WHATSAPP_INTERNAL_KEY}).
      WHATSAPP_SERVICE_URL: http://whatsapp-service:8000
      WHATSAPP_CHANNEL_ID: ${WHATSAPP_CHANNEL_ID}
      WHATSAPP_INTERNAL_KEY: ${WHATSAPP_INTERNAL_KEY}
    volumes:
      - .:/app
    working_dir: /app/apps/pipeline
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-deal_promoter}
      POSTGRES_USER: ${POSTGRES_USER:-deal_promoter}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-deal_promoter}
    ports:
      # Host 5434 -> container 5432 (lower ports are often taken by local Postgres);
      # the app reaches postgres on 5432 over the compose network regardless.
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-deal_promoter} -d ${POSTGRES_DB:-deal_promoter}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # --- WhatsApp publish surface (ADR 0001) ---
  #
  # WAHA is the Dockerized, unofficial WhatsApp-Web HTTP bridge. whatsapp-service is
  # the standalone gateway (no DB, no packages/shared) and the only component that
  # holds WAHA credentials and talks to it; the pipeline calls it over HTTP.
  waha:
    image: devlikeapro/waha:chrome      # NOT :latest — :chrome bundles the engine
    platform: linux/amd64               # required on arm64 hosts
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"           # host-local only
    environment:
      WAHA_API_KEY: ${WAHA_API_KEY}
      WHATSAPP_DEFAULT_ENGINE: WEBJS
      WHATSAPP_DOWNLOAD_MEDIA: "false"
      WAHA_DASHBOARD_USERNAME: admin
      WAHA_DASHBOARD_PASSWORD: ${WAHA_DASHBOARD_PASSWORD}
      WHATSAPP_SWAGGER_USERNAME: admin
      WHATSAPP_SWAGGER_PASSWORD: ${WAHA_DASHBOARD_PASSWORD}
    volumes:
      - ./.sessions:/app/.sessions      # pairing persistence

  whatsapp-service:
    build:
      context: .
      dockerfile: apps/whatsapp-service/Dockerfile
    # Mount the monorepo so vendor/ (built by `composer install`) resolves at runtime,
    # mirroring the pipeline service.
    volumes:
      - .:/app
    working_dir: /app/apps/whatsapp-service
    ports:
      - "8001:8000"                     # distinct from the pipeline's 8000
    environment:
      WAHA_URL: http://waha:3000
      WAHA_API_KEY: ${WAHA_API_KEY}
      WAHA_SESSION: default
      WHATSAPP_INTERNAL_KEY: ${WHATSAPP_INTERNAL_KEY}
    depends_on:
      - waha

volumes:
  postgres_data:
